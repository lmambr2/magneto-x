# Optional MCU internal temperature sensors (mitant / common practice).
#
#   [include optional/mcu_temps.cfg]
#
# Requires modern Klipper with temperature_mcu on both boards.

[temperature_sensor Octopus]
sensor_type: temperature_mcu
min_temp: 0
max_temp: 100

[temperature_sensor Lancer]
sensor_type: temperature_mcu
sensor_mcu: MAG_TOOL
min_temp: 0
max_temp: 100
