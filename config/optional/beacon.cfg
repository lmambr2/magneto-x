# =============================================================================
# Beacon 3D probe — ALTERNATE to stock Lancer load-cell probe
# =============================================================================
# Stock Magneto uses:
#   [probe] pin PE12 + [magneto_load_cell]  (digital latch on toolhead)
#
# Enabling Beacon requires:
#   1) Physical mount + USB to host (power down before sensor-end connect)
#   2) ./os/install-beacon.sh   (clones beacon_klipper, links into Klipper)
#   3) This include ENABLED and stock probe path DISABLED (below)
#   4) serial: + x_offset/y_offset filled for YOUR mount
#   5) BEACON_CALIBRATE → ACCEPT → SAVE_CONFIG
#
# Enable in printer.cfg (comment stock notes):
#   [include optional/beacon.cfg]
#
# Also disable stock probe endstop path:
#   - Comment [probe] in optional/origin_move.cfg OR motion_xy_stock.cfg
#     (or override endstop after include — Beacon provides probe:z_virtual_endstop)
#   - Comment [magneto_load_cell] in magneto_toolhead.cfg when not using latch
#
# Official docs: https://docs.beacon3d.com/quickstart/
# =============================================================================

#####################################################################
# Beacon device
#####################################################################

[beacon]
# REQUIRED — fill after plugging Beacon:
#   ls /dev/serial/by-id/usb-Beacon*
serial: /dev/serial/by-id/usb-Beacon_Beacon_CHANGE_ME-if00

# Nozzle → Beacon offsets (mm). MEASURE for your mount — placeholders only.
# Positive x_offset = Beacon is to the +X of the nozzle (Klipper convention).
x_offset: 0
y_offset: 0

# OriginMove bed ~300×400 — mesh primary direction
mesh_main_direction: x
mesh_runs: 2

# Contact vs proximity — contact is simpler first bring-up without a model
# After BEACON_CALIBRATE + SAVE_CONFIG you can use proximity for faster mesh.
# default_probe_method: contact
# home_method: contact

# Home XY then hop for Z (bed center for OriginMove ≈ 150, 200)
home_xy_position: 150, 200
home_z_hop: 5
home_z_hop_speed: 30
home_xy_move_speed: 300

speed: 5
lift_speed: 5

#####################################################################
# Safe Z home (Beacon as Z endstop)
#####################################################################

[safe_z_home]
home_xy_position: 150, 200
z_hop: 5
z_hop_speed: 30
speed: 200

#####################################################################
# Z stepper overrides for Beacon (must apply after base stepper_z)
#####################################################################
# printer.cfg already sets endstop_pin: probe:z_virtual_endstop
# Beacon requires zero retract:

[stepper_z]
homing_retract_dist: 0

#####################################################################
# Bed mesh zero reference (match safe_z_home / calibrate position)
#####################################################################

[bed_mesh]
zero_reference_position: 150, 200

#####################################################################
# Optional: use Beacon RevH onboard accel for Shake&Tune / TEST_RESONANCES
#####################################################################
# Uncomment after install; comment toolhead [adxl345] path if switching fully.
#
# [resonance_tester]
# accel_chip: beacon
# probe_points: 150, 200, 20
