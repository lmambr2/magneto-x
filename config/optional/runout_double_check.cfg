# Optional filament runout (gpio29) with delayed double-check before PAUSE.
#
# Harvested from EmperorArthur/magneto-x-klipper-config (field unit macros).
# Enable ONLY if your Lancer has a runout switch on MAG_TOOL:gpio29:
#
#   [include optional/runout_double_check.cfg]
#
# Conflicts: do not also enable stock [filament_switch_sensor] on the same pin.
# Does not replace load/unload buttons on gpio20/gpio27 (those stay in magneto_toolhead.cfg).

#####################################################################
# Filament runout — double-check (3s) then PAUSE if still empty
#####################################################################

[delayed_gcode delay_filament_runout_pause]
gcode:
    _DOUBLE_CHECK_PAUSE

[gcode_macro _DOUBLE_CHECK_PAUSE]
gcode:
    {% if printer["gcode_macro _SET_RUNOUT_STATE"].runout_state|int == 0 %}
        M118 Filament runout confirmed — pausing
        PAUSE
    {% endif %}

[gcode_macro _SET_RUNOUT_STATE]
variable_runout_state: 0
gcode:
    {% if params.STATE is defined %}
        {% if params.STATE|int == 0 %}
            SET_GCODE_VARIABLE MACRO=_SET_RUNOUT_STATE VARIABLE=runout_state VALUE=0
        {% else %}
            SET_GCODE_VARIABLE MACRO=_SET_RUNOUT_STATE VARIABLE=runout_state VALUE=1
        {% endif %}
    {% else %}
        SET_GCODE_VARIABLE MACRO=_SET_RUNOUT_STATE VARIABLE=runout_state VALUE=0
    {% endif %}

[gcode_macro _DOUBLE_CHECK_RUNOUT]
gcode:
    UPDATE_DELAYED_GCODE ID=delay_filament_runout_pause DURATION=3

[gcode_button runout_sensor]
pin: ^MAG_TOOL:gpio29
press_gcode:
    _SET_RUNOUT_STATE STATE=1
    M118 Filament inserted
release_gcode:
    _SET_RUNOUT_STATE STATE=0
    M118 Filament removed
    {% if printer.idle_timeout.state == 'Printing' %}
        _DOUBLE_CHECK_RUNOUT
    {% endif %}
