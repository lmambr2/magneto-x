# Optional firmware retraction (G10/G11). Tune lengths for your filament.
#
#   [include optional/firmware_retraction.cfg]
#
# Enable use_fw_retract in client/_CLIENT_VARIABLE if you use Mainsail park macros.

[firmware_retraction]
retract_length: 0.2
retract_speed: 100
unretract_extra_length: 0
unretract_speed: 100
