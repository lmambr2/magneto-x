# OriginMove-style XY (PlazmaZero / many field machines including this lab unit)
#
# Driver1 → X (300 mm), Driver0 → Y (400 mm) — ESP32 MagXY port labels stay
# fixed; only Klipper axis names and QGL/mesh points rotate.
#
# Usage (choose ONE motion file in printer.cfg):
#   # [include motion_xy_stock.cfg]
#   [include optional/origin_move.cfg]
#
# Do not include both — Klipper rejects duplicate [stepper_x] sections.

#####################################################################
# Probe / QGL / mesh (OriginMove frame)
#####################################################################

[probe]
pin: PE12
x_offset: 0
y_offset: 0
z_offset: -0.15
speed: 0.5
lift_speed: 7
samples: 3
samples_result: median
sample_retract_dist: 2
samples_tolerance: 0.07
samples_tolerance_retries: 5

[quad_gantry_level]
# Flipped corners for swapped axes (see PlazmaZero MagnetoX-OriginMove)
gantry_corners:
  -80.8,-38.4
  430.0,408.5
points:
  25,25
  25,290
  280,290
  280,25
speed: 250
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.12
max_adjust: 4

[bed_mesh]
mesh_min: 0, 0
# X max ~300, Y max ~400 on this orientation
mesh_max: 280,380
speed: 150
horizontal_move_z: 2
probe_count: 6,8
algorithm: bicubic
split_delta_z: 0.0125
move_check_distance: 3
mesh_pps: 4,4
fade_start: 0
fade_end: 3
fade_target: 0

#####################################################################
# Gantry steppers (swapped names; same Octopus pins as stock)
#####################################################################

# Driver1 hardware → logical X (short axis, ~300 mm)
[stepper_x]
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 16
endstop_pin: ^!PE8
rotation_distance: 3.2
step_pulse_duration: 0.0000002
position_endstop: 0
position_max: 300
homing_speed: 50

# Driver0 hardware → logical Y (long axis, ~400 mm)
# Endstop at min (0) matches Peopoly stock + this lab unit's live backup.
# (Earlier draft used position_endstop: 400 which homes toward max and
# causes "No trigger on stepper_y after full movement" when the switch is at min.)
[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
step_pulse_duration: 0.0000002
microsteps: 16
endstop_pin: ^!PE9
rotation_distance: 3.2
position_endstop: 0
position_max: 400
homing_speed: 50
