# =============================================================================
# Alt hardware — NOT enabled. Reference only.
# =============================================================================
# Stock Magneto X uses:
#   - MagXY linear motors (ESP32 + MotionG) + magneto-manager ENABLE/DISABLE
#   - Lancer digital load-cell latch → [magneto_load_cell] + probe pin PE12
#
# The following are community/hardware redesign paths. Leave commented.
# Enabling any of these without matching hardware will break probing/motion.
#
# --- Beacon / Eddy current (e.g. Schmudus / Pi+Kalico stacks) ---
# Requires removing or bypassing the stock digital latch probe path and
# wiring a Beacon/Eddy board. Not first-class in this package.
# [probe_eddy_current]
# ...
#
# --- Upstream [load_cell_probe] + HX711/HX717 ---
# Stock Lancer is STC8051+CS1237 digital latch, NOT a direct HX ADC.
# Do not substitute load_cell_probe without rewiring the toolhead.
# [load_cell_probe]
# sensor_type: hx717
# ...
#
# --- EmperorArthur / community ESP32 MagXY firmware ---
# Vendor ESP32 FW is default for v1. See docs/ESP32_VENDOR.md.
#
# This file is intentionally empty of active sections so it can be
# [include optional/alt_hardware_notes.cfg] for operators who want the
# comments visible in their config tree without changing behavior.
