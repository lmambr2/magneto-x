# Klippain Shake&Tune — resonance / input-shaper graphs and helpers
# https://github.com/Frix-x/klippain-shaketune
#
# Requires:
#   - [adxl345] + [resonance_tester] (in magneto_toolhead.cfg)
#   - os/install-shaketune.sh (or postinstall) to clone + link module into ~/klipper
#
# Usage (console / Mainsail): AXES_SHAPER_CALIBRATION, BELTS_SHAPER_CALIBRATION,
#   INPUTSHAPER_CALIBRATION, VIBRATIONS_CALIBRATION, etc. — see upstream docs.
#
# MagXY note: closed-loop motors already damp a lot; Shake&Tune is optional polish
# and diagnostics, not required for first motion.

[shaketune]
result_folder: ~/printer_data/config/ShakeTune_results
number_of_results_to_keep: 10
keep_raw_data: False
show_macros_in_webui: True
# Zero 2 is low-RAM — keep chunk size conservative (upstream default ~2)
measurements_chunk_size: 2
timeout: 900
dpi: 200
