# Kalico-only optional tunables for Magneto X A/B testing.
#
# Include ONLY when running magneto-x-klipper branch magneto-x-kalico:
#   [include optional/danger_options.cfg]
#
# On mainline (magneto-x) this section name does not exist → config error.
#
# Docs: https://docs.kalico.gg/Config_Reference.html#danger-options
# Schmudus field note: multi_mcu_trsync_timeout 0.050 on CAN @ 250k dual-MCU.

[danger_options]
# Dual MCU (Octopus USB + Lancer CAN @ 250k): stock Kalico ~0.025s can be tight.
multi_mcu_trsync_timeout: 0.050

# Leave off unless you know you need them:
# allow_plugin_override: False
# minimal_logging: False

# If you still hit trsync / "timer too close" after verifying CAN 250k +
# txqueuelen 512, try 0.075 carefully — do not raise blindly.
