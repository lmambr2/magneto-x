# Kalico-only optional tunables for Magneto X A/B testing.
#
# Include ONLY when running magneto-x-klipper branch magneto-x-kalico:
#   [include optional/danger_options.cfg]
#
# On mainline (magneto-x) this file will error — leave the include commented.
#
# Read carefully: https://docs.kalico.gg/Config_Reference.html#danger-options
# Start conservative; raise multi_mcu_trsync_timeout only if dual-MCU CAN
# (Octopus + Lancer) shows trsync / timer too close failures.

[danger_options]
# Allow multi-MCU setups a little more slack on Lancer CAN @ 250k.
# Stock Kalico default is often ~0.025s; Schmudus suggested trying 0.050.
multi_mcu_trsync_timeout: 0.050

# Keep other danger knobs at Kalico defaults unless you know you need them.
# allow_plugin_override: False
