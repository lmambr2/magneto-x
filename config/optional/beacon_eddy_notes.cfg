# =============================================================================
# Beacon / BTT Eddy — NOT for stock Lancer load-cell (hardware redesign).
# =============================================================================
# Enable nothing here by default. After wiring a Beacon or Eddy probe and
# removing/bypassing the stock digital latch path, adapt the examples below
# from upstream docs and your board pinout.
#
# Stock Magneto uses [magneto_load_cell] + probe pin PE12 — keep that unless
# you intentionally convert the toolhead.
#
#   # [include optional/beacon_eddy_notes.cfg]   # comments only OK
#
# Upstream references:
#   https://docs.beacon3d.com/
#   Klipper Config_Reference: probe_eddy_current / load_cell_probe
#
# Typical (DO NOT copy blindly — wrong pins brick probing):
#
# [beacon]
# serial: /dev/serial/by-id/...
# x_offset: ...
# y_offset: ...
#
# [probe_eddy_current btt_eddy]
# sensor_type: btt_eddy
# i2c_mcu: ...
# i2c_bus: ...
# x_offset: ...
# y_offset: ...
#
# Then replace PE12 virtual endstop / QGL probe with the new probe object and
# remove or disable [magneto_load_cell] sticky-probe soft path expectations.
