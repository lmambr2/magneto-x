# Optional shell fallbacks (legacy). Prefer [magneto_linear_motor] (PR-K7).
# Requires gcode_shell_command.py. Do not pass PARAMS= (rejected by default).
# MagXY primary path is native MAGNETO_LINEAR_ENABLE/DISABLE — no shell needed.
#
# Uncomment only if you remove [magneto_linear_motor] or set register_lm_aliases: False
# and redefine LM_* macros to RUN_SHELL_COMMAND.
#
# [gcode_shell_command LINEAR_MOTOR_ENABLE]
# command: curl -sG http://127.0.0.1:8880/send_command --data-urlencode command=ENABLE
# timeout: 3.
# verbose: False
#
# [gcode_shell_command LINEAR_MOTOR_DISABLE]
# command: curl -sG http://127.0.0.1:8880/send_command --data-urlencode command=DISABLE
# timeout: 3.
# verbose: False
