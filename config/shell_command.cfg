# Shell commands used by Magneto X macros.
# Requires klippy/extras/gcode_shell_command.py (not in upstream Klipper).
#
# Linear-motor enable/disable talks to magneto-manager on :8880, which speaks
# to the ESP32 MagXY controller over USB serial (CH340 @ 115200).

[gcode_shell_command LINEAR_MOTOR_ENABLE]
command: curl -sG http://127.0.0.1:8880/send_command --data-urlencode command=ENABLE
timeout: 3.
verbose: False

[gcode_shell_command LINEAR_MOTOR_DISABLE]
command: curl -sG http://127.0.0.1:8880/send_command --data-urlencode command=DISABLE
timeout: 3.
verbose: False

[gcode_shell_command GET_MIRROR_VERSION]
command: curl -sG http://127.0.0.1:8880/get_os_version
timeout: 2.
verbose: True

# Optional smoke test
[gcode_shell_command hello_world]
command: echo hello world
timeout: 2.
verbose: True

[gcode_macro HELLO_WORLD]
gcode:
    RUN_SHELL_COMMAND CMD=hello_world
