#### crowsnest.conf — Magneto X stock camera (package default)
####
#### Peopoly ships a 1080p USB cam (lab VID:PID often 0c45:6366 Microdia).
#### Stream URLs (via MainsailOS nginx when crowsnest is installed):
####   http://<host>/webcam/?action=stream
####   http://<host>/webcam/?action=snapshot
#### Backend docs: https://docs.mainsail.xyz/crowsnest/
####
#### install-crowsnest.sh may rewrite [cam 1] device= after probing /dev/video*.

[crowsnest]
log_path: /home/pi/printer_data/logs/crowsnest.log
log_level: verbose
delete_log: false
no_proxy: false

[cam 1]
mode: ustreamer
enable_rtsp: false
rtsp_port: 8554
port: 8080
# Prefer a real capture node; install script rewrites if needed.
# Stock Peopoly often landed on /dev/video1 (video0 = metadata-only).
device: /dev/video0
# Stock marketing is 1080p30; Zero 2 RAM is tight — 720p15 is safer under load.
# Bump to 1920x1080 / 30 if you have headroom (free -h).
resolution: 1280x720
max_fps: 15
#custom_flags:
#v4l2ctl:
