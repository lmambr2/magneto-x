# Stock Peopoly XY orientation (docs / many factory machines)
#
# Driver0 → X (400 mm axis), Driver1 → Y (300 mm axis)
# QGL / mesh match this coordinate frame.
#
# For OriginMove-style swap (live machines with X=300 / Y=400), do NOT include
# this file — include optional/origin_move.cfg instead (see config/README.md).

#####################################################################
# Probe / QGL / mesh (stock frame)
#####################################################################

[probe]
pin: PE12
x_offset: 0
y_offset: 0
z_offset: -0.15
# nmavor: load-cell accuracy improves dramatically at 0.5 vs 2.0 mm/s
speed: 0.5
lift_speed: 7
samples: 3
samples_result: median
sample_retract_dist: 2
samples_tolerance: 0.07
samples_tolerance_retries: 5

[quad_gantry_level]
gantry_corners:
  -54.8,-35.8
  412.8,367.8
points:
  10,10
  10,290
  390,290
  390,10
speed: 250
horizontal_move_z: 5
retries: 3
retry_tolerance: 0.12
max_adjust: 4

[bed_mesh]
mesh_min: 0, 0
mesh_max: 380,280
speed: 150
horizontal_move_z: 2
probe_count: 8,6
algorithm: bicubic
split_delta_z: 0.0125
move_check_distance: 3
mesh_pps: 4,4
fade_start: 0
fade_end: 3
fade_target: 0

#####################################################################
# Gantry steppers (stock orientation)
#####################################################################

# Driver0 — long axis as X
[stepper_x]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
step_pulse_duration: 0.0000002
microsteps: 16
endstop_pin: ^!PE9
rotation_distance: 3.2
position_endstop: 0
position_max: 400
homing_speed: 50

# Driver1 — short axis as Y
[stepper_y]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
endstop_pin: ^!PE8
rotation_distance: 3.2
step_pulse_duration: 0.0000002
position_endstop: 300
position_max: 300
homing_speed: 50
