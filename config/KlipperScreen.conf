# KlipperScreen — Magneto X package default
# Docs: https://klipperscreen.readthedocs.io/
#
# Deployed by os/install-klipperscreen.sh / postinstall when missing.
# Panel may append auto-generated #~# blocks below [main].

[main]
# Local Moonraker (MainsailOS default)
moonraker_host: 127.0.0.1
moonraker_port: 7125

# Touch-friendly defaults on the stock 7" panel
job_fill: False
print_estimate_method: file
screen_blanking: 300
use_dpms: False
show_heater_power: True
only_heaters: False

# Network panel needs NetworkManager (installed by install-klipperscreen.sh)
# Connect Wi‑Fi from: Menu → Network (or Settings → Network)

[printer Magneto X]
moonraker_host: 127.0.0.1
moonraker_port: 7125
# gcode macros for MagXY appear as ordinary macros (LM_ENABLE / LM_DISABLE)
