# Timelapse — package stub (include always resolves offline).
#
# This is NOT a full moonraker-timelapse install. Soft no-op macros prevent
# hard "unknown command" mid-print if the slicer emits TIMELAPSE_* frames.
#
# On a host with moonraker-timelapse installed, replace this file:
#   ln -sfn ~/moonraker-timelapse/klipper_macro/timelapse.cfg \
#          ~/printer_data/config/timelapse.cfg
# then RESTART. Real macros will override these names.

[gcode_macro TIMELAPSE_TAKE_FRAME]
description: Stub — install moonraker-timelapse and replace timelapse.cfg
gcode:
    {% if printer["gcode_macro _TIMELAPSE_NEW_FRAME"] is defined %}
        # Real component may define helpers; prefer linked full file over stub
        _TIMELAPSE_NEW_FRAME
    {% endif %}
    # No-op when stub only — avoids print abort

[gcode_macro TIMELAPSE_RENDER]
description: Stub — install moonraker-timelapse for real render
gcode:
    {action_respond_info("timelapse stub: TIMELAPSE_RENDER ignored — link moonraker-timelapse macros")}

[gcode_macro HYPERLAPSE]
description: Stub — install moonraker-timelapse for hyperlapse
gcode:
    {action_respond_info("timelapse stub: HYPERLAPSE ignored — link moonraker-timelapse macros")}

[gcode_macro _SET_TIMELAPSE_SETUP]
description: Stub setup hook for moonraker-timelapse clients
gcode:
    # Accept and ignore setup until real component is linked
