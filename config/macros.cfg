#####################################################################
# Magneto X modern macros
# Based on Peopoly stock + community FAQ fixes (pause/resume, LM naming)
#####################################################################

#####################################################################
# Print Start / End
#####################################################################

[gcode_macro PRINT_START]
description: Enable MagXY, level, mesh, and purge
gcode:
    LM_ENABLE
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    QUAD_GANTRY_LEVEL
    BED_MESH_PROFILE LOAD=default
    G90
    # Simple purge line (KAMP Line_Purge can replace this)
    G0 Y3 X150 F6000.0
    G1 Z0.2 F500.0
    G92 E0.0
    G1 E2 F500.0
    G1 X250 E20.0 F1500.0
    G1 Y3.3 F500
    G1 X150 E20.0 F1500.0
    G92 E0.0
    G1 Z2.0

[delayed_gcode delay_disable_motor]
gcode:
    LM_DISABLE

[gcode_macro PRINT_END]
variable_max_z: 300
gcode:
    G91
    G1 Z5 F600
    G1 E-5 F300
    G90
    G1 X150 Y10 F12000
    M104 S0
    M140 S0
    M106 S0
    {% set target_z = ((printer.toolhead.position.z + max_z) / 2)|round(1) %}
    G1 Z{target_z} F600
    UPDATE_DELAYED_GCODE ID=delay_disable_motor DURATION=30

#####################################################################
# Calibration helpers
#####################################################################

[gcode_macro LEVEL_BED]
description: Quad gantry level
gcode:
    QUAD_GANTRY_LEVEL

[gcode_macro CREATE_BED_MESH]
description: Create/update the default bed mesh
gcode:
    BED_MESH_CALIBRATE

[gcode_macro FULL_CALIBRATE_BED]
description: QGL + mesh
gcode:
    QUAD_GANTRY_LEVEL
    BED_MESH_CALIBRATE

[gcode_macro SET_XYZ_POSITION]
description: Force kinematic position (debug only — do not use casually)
gcode:
    SET_KINEMATIC_POSITION X=0 Y=0 Z=150

[gcode_macro RUN_INPUT_SHAPER]
description: MagXY drivers already smooth; use carefully
gcode:
    SHAPER_CALIBRATE

[gcode_macro Z_TO_BOTTOM]
description: Home Z if needed, then lower bed
gcode:
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}
    G1 Z295

#####################################################################
# Pause / Resume
# IMPORTANT: Comment out conflicting PAUSE/RESUME in mainsail.cfg
# (community FAQ — stock has duplicate definitions).
#####################################################################

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% if printer['pause_resume'].is_paused %}
        {action_respond_info("Print already paused")}
    {% else %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE={printer[printer.toolhead.extruder].target}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_fan_speed VALUE={printer["fan"].speed}
        {% if printer["fan_generic Jetstream"] is defined %}
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_jetstream_speed VALUE={printer["fan_generic Jetstream"].speed}
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSE
        BASE_PAUSE
        G91
        G1 Z10 F300
        G90
        G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000
        SAVE_GCODE_STATE NAME=PAUSEPARK
        M107
        UPDATE_DELAYED_GCODE ID=cool_hot_end DURATION=300
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_last_fan_speed: 0
variable_last_jetstream_speed: 0
variable_last_extruder_temp: 0
gcode:
    {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
    M109 S{last_extruder_temp}
    M106 S{(last_fan_speed * 255)|int}
    {% if printer["fan_generic Jetstream"] is defined %}
        SET_FAN_SPEED FAN=Jetstream SPEED={last_jetstream_speed}
    {% endif %}
    BASE_RESUME VELOCITY={params.VELOCITY|default(velocity)}

[delayed_gcode cool_hot_end]
gcode:
    {% if printer['pause_resume'].is_paused %}
        M104 S0
    {% endif %}

#####################################################################
# Filament
#####################################################################

[gcode_macro LOAD_FILAMENT]
gcode:
    {% if printer[printer.toolhead.extruder].temperature > printer.configfile.settings['extruder'].min_extrude_temp %}
        {% set speed = params.SPEED|default(300) %}
        M118 Loading filament
        G91
        G92 E0
        G1 E55 F{speed}
        G90
    {% else %}
        M118 Error: Extruder temperature too low, unable to load filament.
    {% endif %}

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if printer[printer.toolhead.extruder].temperature > printer.configfile.settings['extruder'].min_extrude_temp %}
        {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity %}
        M118 Unloading filament
        G92 E0
        G1 E-105 F{max_velocity}
    {% else %}
        M118 Error: Extruder temperature too low, unable to unload filament.
    {% endif %}

#####################################################################
# Mesh / QGL wrappers
#####################################################################

[gcode_macro MESH_LOAD]
gcode:
    BED_MESH_PROFILE LOAD=default

[gcode_macro BED_MESH_CALIBRATE]
rename_existing: BED_MESH_CALIBRATE_BASE
gcode:
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}
    BED_MESH_CALIBRATE_BASE
    G28 Z

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: QUAD_GANTRY_LEVEL_BASE
gcode:
    G28
    QUAD_GANTRY_LEVEL_BASE
    G28 Z

#####################################################################
# MagXY linear motor control (via magneto-manager :8880)
# Fixed stock typo: LINER_* -> LINEAR_*
#####################################################################

[gcode_macro LM_ENABLE]
description: Enable MagXY linear motors
gcode:
    G4 P500
    RUN_SHELL_COMMAND CMD=LINEAR_MOTOR_ENABLE

[gcode_macro LM_DISABLE]
description: Disable MagXY linear motors
gcode:
    RUN_SHELL_COMMAND CMD=LINEAR_MOTOR_DISABLE

[gcode_macro _LM_ENABLE]
gcode:
    RUN_SHELL_COMMAND CMD=LINEAR_MOTOR_ENABLE

[gcode_macro _LM_DISABLE]
gcode:
    RUN_SHELL_COMMAND CMD=LINEAR_MOTOR_DISABLE

[gcode_macro LINEAR_MOTOR]
gcode:
    {% if params.ENABLE is defined and params.ENABLE|int == 0 %}
        RUN_SHELL_COMMAND CMD=LINEAR_MOTOR_DISABLE
    {% else %}
        RUN_SHELL_COMMAND CMD=LINEAR_MOTOR_ENABLE
    {% endif %}

# Stock alias kept for old macros / KlipperScreen panels
[gcode_macro LINER_MOTOR]
gcode:
    LINEAR_MOTOR {rawparams}

[gcode_macro MAGNETO_OS_VERSION]
gcode:
    RUN_SHELL_COMMAND CMD=GET_MIRROR_VERSION

#####################################################################
# Jetstream as M106 P2
#####################################################################

[gcode_macro M106]
rename_existing: G106
gcode:
    {% if params.P is defined and params.P|int == 2 %}
        {% if params.S is defined %}
            {% if params.S|int == 255 %}
                {% set realspeed = 1.0 %}
            {% elif params.S|int == 0 %}
                {% set realspeed = 0.0 %}
            {% else %}
                {% set realspeed = params.S|float / 255.0 %}
            {% endif %}
        {% else %}
            {% set realspeed = 1.0 %}
        {% endif %}
        SET_FAN_SPEED FAN=Jetstream SPEED={realspeed}
    {% else %}
        {% if params.S is defined %}
            G106 S{params.S}
        {% else %}
            G106 S255
        {% endif %}
    {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
    {% if params.P is defined and params.P|int == 2 %}
        SET_FAN_SPEED FAN=Jetstream SPEED=0
    {% else %}
        SET_FAN_SPEED FAN=Jetstream SPEED=0
        G107
    {% endif %}

#####################################################################
# Chamber light
#####################################################################

[gcode_macro TOGGLE_LIGHTS]
gcode:
    {% if printer['led Chamber_Lights'].color_data[0][3] > 0 %}
        SET_LED LED=Chamber_Lights WHITE=0.0
    {% else %}
        SET_LED LED=Chamber_Lights WHITE=0.5
    {% endif %}
