#####################################################################
# Magneto X modern macros
# Based on Peopoly stock + community FAQ fixes (pause/resume, LM naming)
#####################################################################

#####################################################################
# Print Start / End
#
# Orca (system Peopoly Magneto X profile) machine start G-code:
#   M190 S[bed_temperature_initial_layer_single]
#   M109 S[nozzle_temperature_initial_layer]
#   PRINT_START EXTRUDER=[nozzle_temperature_initial_layer] BED=[bed_temperature_initial_layer_single]
# Extended (optional):
#   PRINT_START EXTRUDER=... BED=... CHAMBER=... MESH=1
# See slicer/orca/ for Magneto-modern start G-code + Label Objects.
#####################################################################

[gcode_macro PRINT_START]
description: MagXY on → home → heat (if passed) → QGL → KAMP mesh → SMART_PARK → LINE_PURGE
gcode:
    # Params (all optional; Orca stock passes EXTRUDER + BED after its own M190/M109):
    #   EXTRUDER / HOTEND  — nozzle °C (M109 before purge if > 0)
    #   BED                — bed °C (M190 before QGL if > 0 and not already there)
    #   CHAMBER            — logged only (no stock chamber heater module)
    #   MESH=0             — skip BED_MESH_CALIBRATE (rare; default 1)
    #   PURGE=0            — skip LINE_PURGE (default 1)
    #   PARK=0             — skip SMART_PARK before final nozzle heat (default 1)
    # Adaptive mesh bounds come from [exclude_object] labels (KAMP), not PRINT_MIN/MAX.
    {% set bed_temp = params.BED|default(params.BED_TEMP|default(0))|float %}
    {% set extruder_temp = params.EXTRUDER|default(params.HOTEND|default(params.EXTRUDER_TEMP|default(0)))|float %}
    {% set chamber_temp = params.CHAMBER|default(params.CHAMBER_TEMP|default(0))|float %}
    {% set do_mesh = params.MESH|default(1)|int != 0 %}
    {% set do_purge = params.PURGE|default(1)|int != 0 %}
    {% set do_park = params.PARK|default(1)|int != 0 %}

    # Cancel any pending MagXY auto-disable from a prior PRINT_END
    UPDATE_DELAYED_GCODE ID=delay_disable_motor DURATION=0

    LM_ENABLE
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}

    {% if bed_temp > 0 %}
        {action_respond_info("PRINT_START: bed → %.0f°C"|format(bed_temp))}
        M190 S{bed_temp}
    {% endif %}

    {% if chamber_temp > 0 %}
        {action_respond_info("PRINT_START: chamber target %.0f°C (no automatic chamber control in this package)"|format(chamber_temp))}
    {% endif %}

    QUAD_GANTRY_LEVEL

    {% if do_mesh %}
        # KAMP Adaptive_Meshing owns BED_MESH_CALIBRATE (full bed if no object labels)
        BED_MESH_CALIBRATE
    {% else %}
        {action_respond_info("PRINT_START: MESH=0 — skipping bed mesh")}
    {% endif %}

    # Park near print while nozzle reaches print temp (KAMP Smart_Park)
    {% if do_park and printer["gcode_macro SMART_PARK"] is defined %}
        SMART_PARK
    {% endif %}

    {% if extruder_temp > 0 %}
        {action_respond_info("PRINT_START: extruder → %.0f°C"|format(extruder_temp))}
        M109 S{extruder_temp}
    {% endif %}

    G90
    {% if do_purge %}
        LINE_PURGE
    {% endif %}

[delayed_gcode delay_disable_motor]
gcode:
    LM_DISABLE

[gcode_macro PRINT_END]
description: Retract, park, cool, schedule MagXY disable
variable_max_z: 300
gcode:
    G91
    G1 Z5 F600
    G1 E-5 F300
    G90
    G1 X150 Y10 F12000
    M104 S0
    M140 S0
    M106 S0
    {% if printer["fan_generic Jetstream"] is defined %}
        SET_FAN_SPEED FAN=Jetstream SPEED=0
    {% endif %}
    {% set target_z = ((printer.toolhead.position.z + max_z) / 2)|round(1) %}
    G1 Z{target_z} F600
    UPDATE_DELAYED_GCODE ID=delay_disable_motor DURATION=30

#####################################################################
# Calibration helpers
#####################################################################

[gcode_macro LEVEL_BED]
description: Arm MagXY and quad gantry level
gcode:
    # QUAD_GANTRY_LEVEL wrapper enables MagXY; keep explicit for UI clarity
    LM_ENABLE
    QUAD_GANTRY_LEVEL

[gcode_macro CREATE_BED_MESH]
description: Hot bed mesh (default BED=60). BED=0 skips heat. Uses KAMP adaptive when labels present.
gcode:
    # Prefer print-temp mesh — cold maps differ (see docs/AUDIT / lab notes).
    #   CREATE_BED_MESH
    #   CREATE_BED_MESH BED=60
    #   CREATE_BED_MESH BED=0
    {% set bed = params.BED|default(60)|float %}
    LM_ENABLE
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% endif %}
    {% if bed > 0 %}
        {action_respond_info("CREATE_BED_MESH: bed → %.0f°C"|format(bed))}
        M190 S{bed}
    {% else %}
        {action_respond_info("CREATE_BED_MESH: BED=0 — meshing without bed heat")}
    {% endif %}
    BED_MESH_CALIBRATE

[gcode_macro FULL_CALIBRATE]
description: Self-check — LM_ENABLE, home, QGL, hot mesh. SAVE=1 persists mesh. BED=60 default.
gcode:
    # One-button path (Mainsail console / macros panel). Does not print-purge.
    #   FULL_CALIBRATE
    #   FULL_CALIBRATE BED=60          # default; BED=0 for cold mesh
    #   FULL_CALIBRATE SAVE=1          # BED_MESH_PROFILE SAVE=default + SAVE_CONFIG
    #   FULL_CALIBRATE SHAPER=1        # also SHAPER_CALIBRATE (slow; MagXY already smooths)
    # QGL is session-only (not written by SAVE_CONFIG). Re-run after restart if needed.
    {% set do_save = params.SAVE|default(0)|int != 0 %}
    {% set do_shaper = params.SHAPER|default(0)|int != 0 %}
    {% set bed = params.BED|default(60)|float %}

    UPDATE_DELAYED_GCODE ID=delay_disable_motor DURATION=0
    LM_ENABLE
    G28
    {% if bed > 0 %}
        {action_respond_info("FULL_CALIBRATE: bed → %.0f°C before QGL/mesh"|format(bed))}
        M190 S{bed}
    {% endif %}
    QUAD_GANTRY_LEVEL
    BED_MESH_CALIBRATE

    {% if do_shaper %}
        {action_respond_info("FULL_CALIBRATE: SHAPER_CALIBRATE (accel required)")}
        SHAPER_CALIBRATE
    {% endif %}

    {% if do_save %}
        BED_MESH_PROFILE SAVE=default
        {action_respond_info("FULL_CALIBRATE: saving mesh profile 'default' (SAVE_CONFIG restarts Klipper)")}
        SAVE_CONFIG
    {% else %}
        {action_respond_info("FULL_CALIBRATE done. Mesh active this session. FULL_CALIBRATE SAVE=1 to persist mesh. QGL is not saved.")}
    {% endif %}

[gcode_macro FULL_CALIBRATE_BED]
description: Alias for FULL_CALIBRATE (QGL + mesh)
gcode:
    FULL_CALIBRATE {rawparams}

[gcode_macro SET_XYZ_POSITION]
description: Force kinematic position (EXPERT ONLY — LM_DISABLE first; easy crash)
gcode:
    {action_respond_info("SET_XYZ_POSITION: expert recovery only — prefer LM_DISABLE before force kinematics")}
    SET_KINEMATIC_POSITION X=0 Y=0 Z=150

[gcode_macro RUN_INPUT_SHAPER]
description: MagXY drivers already smooth; use carefully
gcode:
    SHAPER_CALIBRATE

[gcode_macro Z_TO_BOTTOM]
description: Home Z if needed, then lower bed
gcode:
    {% if "z" not in printer.toolhead.homed_axes %}
        G28 Z
    {% endif %}
    G1 Z295

#####################################################################
# Pause / Resume (sole definitions — mainsail.cfg has none)
#####################################################################

[gcode_macro PAUSE]
rename_existing: BASE_PAUSE
gcode:
    {% if printer['pause_resume'].is_paused %}
        {action_respond_info("Print already paused")}
    {% else %}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_extruder_temp VALUE={printer[printer.toolhead.extruder].target}
        SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_fan_speed VALUE={printer["fan"].speed}
        {% if printer["fan_generic Jetstream"] is defined %}
            SET_GCODE_VARIABLE MACRO=RESUME VARIABLE=last_jetstream_speed VALUE={printer["fan_generic Jetstream"].speed}
        {% endif %}
        SAVE_GCODE_STATE NAME=PAUSE
        BASE_PAUSE
        G91
        G1 Z10 F300
        G90
        G1 X{printer.toolhead.axis_maximum.x/2} Y{printer.toolhead.axis_minimum.y+5} F6000
        SAVE_GCODE_STATE NAME=PAUSEPARK
        M107
        UPDATE_DELAYED_GCODE ID=cool_hot_end DURATION=300
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
variable_last_fan_speed: 0
variable_last_jetstream_speed: 0
variable_last_extruder_temp: 0
gcode:
    {% set velocity = printer.configfile.settings.pause_resume.recover_velocity %}
    M109 S{last_extruder_temp}
    M106 S{(last_fan_speed * 255)|int}
    {% if printer["fan_generic Jetstream"] is defined %}
        SET_FAN_SPEED FAN=Jetstream SPEED={last_jetstream_speed}
    {% endif %}
    BASE_RESUME VELOCITY={params.VELOCITY|default(velocity)}

[delayed_gcode cool_hot_end]
gcode:
    {% if printer['pause_resume'].is_paused %}
        M104 S0
    {% endif %}

#####################################################################
# Filament
#####################################################################

[gcode_macro LOAD_FILAMENT]
gcode:
    {% if printer[printer.toolhead.extruder].temperature > printer.configfile.settings['extruder'].min_extrude_temp %}
        {% set speed = params.SPEED|default(300) %}
        M118 Loading filament
        G91
        G92 E0
        G1 E55 F{speed}
        G90
    {% else %}
        M118 Error: Extruder temperature too low, unable to load filament.
    {% endif %}

[gcode_macro UNLOAD_FILAMENT]
gcode:
    {% if printer[printer.toolhead.extruder].temperature > printer.configfile.settings['extruder'].min_extrude_temp %}
        {% set max_velocity = printer.configfile.settings['extruder'].max_extrude_only_velocity %}
        M118 Unloading filament
        G92 E0
        G1 E-105 F{max_velocity}
    {% else %}
        M118 Error: Extruder temperature too low, unable to unload filament.
    {% endif %}

#####################################################################
# Mesh / QGL wrappers
#####################################################################

[gcode_macro MESH_LOAD]
description: Load saved default mesh if present (prints use KAMP adaptive)
gcode:
    {% set profiles = printer.bed_mesh.profiles %}
    {% if profiles is defined and 'default' in profiles %}
        BED_MESH_PROFILE LOAD=default
        {action_respond_info("Loaded bed_mesh profile [default]")}
    {% else %}
        {action_respond_info("No bed_mesh profile [default] saved — run BED_MESH_CALIBRATE, then BED_MESH_PROFILE SAVE=default and SAVE_CONFIG. Or just print: PRINT_START remeshes via KAMP.")}
    {% endif %}

# BED_MESH_CALIBRATE is owned by KAMP Adaptive_Meshing (KAMP_Settings.cfg).
# Do not redefine it here — a second rename breaks adaptive mesh_min/max params.
# Magneto Z re-home is handled inside config/KAMP/Adaptive_Meshing.cfg.

[gcode_macro QUAD_GANTRY_LEVEL]
rename_existing: QUAD_GANTRY_LEVEL_BASE
gcode:
    # MagXY must be armed before any XY/Z travel (bare LEVEL_BED / panel QGL)
    LM_ENABLE
    # Skip full re-home when already homed (avoids double G28 under FULL_CALIBRATE)
    {% if "xyz" not in printer.toolhead.homed_axes %}
        G28
    {% else %}
        {% if "z" not in printer.toolhead.homed_axes %}
            G28 Z
        {% endif %}
    {% endif %}
    QUAD_GANTRY_LEVEL_BASE
    G28 Z

#####################################################################
# MagXY linear motor control via [magneto_linear_motor] (PR-K7)
# LM_ENABLE / LM_DISABLE are registered by the module (register_lm_aliases).
# Do not redefine them here. Optional shell fallback: shell_command.cfg
#####################################################################

[gcode_macro LINEAR_MOTOR]
description: ENABLE=1 arm MagXY, ENABLE=0 disarm
gcode:
    {% if params.ENABLE is defined and params.ENABLE|int == 0 %}
        MAGNETO_LINEAR_DISABLE
    {% else %}
        MAGNETO_LINEAR_ENABLE
    {% endif %}

# Compatibility alias only (stock typo / KlipperScreen)
[gcode_macro LINER_MOTOR]
gcode:
    LINEAR_MOTOR {rawparams}

# Peopoly-era name kept as alias — this is MagXY *manager* version, not OS image.
[gcode_macro MAGNETO_OS_VERSION]
description: Alias for MagXY manager version (not host OS). Prefer MAGNETO_MANAGER_VERSION.
gcode:
    MAGNETO_LINEAR_VERSION

[gcode_macro MAGNETO_MANAGER_VERSION]
description: Report MagXY / magneto-manager version via [magneto_linear_motor]
gcode:
    MAGNETO_LINEAR_VERSION


#####################################################################
# Startup: load saved default mesh if present (B11 — not auto-applied by Klipper)
#####################################################################

[delayed_gcode _MAGNETO_LOAD_DEFAULT_MESH]
initial_duration: 2.0
gcode:
    {% if printer.bed_mesh is defined and printer.bed_mesh.profiles is defined
          and 'default' in printer.bed_mesh.profiles %}
        {% if printer.bed_mesh.profile_name != 'default' %}
            BED_MESH_PROFILE LOAD=default
            {action_respond_info("Loaded bed_mesh profile [default] at startup")}
        {% endif %}
    {% endif %}


#####################################################################




[gcode_macro M106]
rename_existing: G106
gcode:
    {% if params.P is defined and params.P|int == 2 %}
        {% if params.S is defined %}
            {% if params.S|int == 255 %}
                {% set realspeed = 1.0 %}
            {% elif params.S|int == 0 %}
                {% set realspeed = 0.0 %}
            {% else %}
                {% set realspeed = params.S|float / 255.0 %}
            {% endif %}
        {% else %}
            {% set realspeed = 1.0 %}
        {% endif %}
        SET_FAN_SPEED FAN=Jetstream SPEED={realspeed}
    {% else %}
        {% if params.S is defined %}
            G106 S{params.S}
        {% else %}
            G106 S255
        {% endif %}
    {% endif %}

[gcode_macro M107]
rename_existing: G107
gcode:
    {% if params.P is defined and params.P|int == 2 %}
        SET_FAN_SPEED FAN=Jetstream SPEED=0
    {% else %}
        SET_FAN_SPEED FAN=Jetstream SPEED=0
        G107
    {% endif %}

#####################################################################
# Chamber light
#####################################################################

[gcode_macro TOGGLE_LIGHTS]
gcode:
    {% if printer['led Chamber_Lights'].color_data[0][3] > 0 %}
        SET_LED LED=Chamber_Lights WHITE=0.0
    {% else %}
        SET_LED LED=Chamber_Lights WHITE=0.5
    {% endif %}
