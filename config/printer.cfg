# Magneto X — deployable printer config (parse-ready package)
#
# Deploy: copy this tree to ~/printer_data/config/ on the host.
# 1) Edit magneto_device.cfg with your serial + CAN UUID
# 2) Choose ONE motion profile (stock XY vs OriginMove) below
# 3) FIRMWARE_RESTART
#
# See config/README.md for full notes.

[include shell_command.cfg]
[include mainsail.cfg]
[include macros.cfg]
[include magneto_device.cfg]
[include magneto_toolhead.cfg]
[include KAMP_Settings.cfg]

# --- Motion / probe frame (pick exactly one) ---
# Default: OriginMove (X=300 / Y=400) — matches many field machines + lab unit.
# For factory stock Driver0=X400 / Driver1=Y300, swap the two includes below.
[include optional/origin_move.cfg]
# [include motion_xy_stock.cfg]
# Kalico A/B only (magneto-x-kalico host) — leave commented on mainline:
# [include optional/danger_options.cfg]

#####################################################################
# Printer general
#####################################################################

[printer]
kinematics: cartesian
max_velocity: 1500
max_accel: 15000
max_z_velocity: 5
max_z_accel: 100

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PE8, EXP1_2=PE7,
    EXP1_3=PE9, EXP1_4=PE10,
    EXP1_5=PE12, EXP1_6=PE13,
    EXP1_7=PE14, EXP1_8=PE15,
    EXP1_9=<GND>, EXP1_10=<5V>,

    # EXP2 header
    EXP2_1=PA6, EXP2_2=PA5,
    EXP2_3=PB1, EXP2_4=PA4,
    EXP2_5=PB2, EXP2_6=PA7,
    EXP2_7=PC15, EXP2_8=<RST>,
    EXP2_9=<GND>, EXP2_10=PC5

[exclude_object]

[respond]

[idle_timeout]
timeout: 3600

[gcode_arcs]
resolution: 0.1

[force_move]
enable_force_move: True

# MagXY drivers already smooth motion; leave conservative defaults
[input_shaper]
shaper_type_y: zv
shaper_freq_y: 27.0
shaper_type_x: ei
shaper_freq_x: 44.4

#####################################################################
# Bed
#####################################################################

[heater_bed]
heater_pin: PA1
sensor_pin: PF3
sensor_type: Generic 3950
control: pid
pid_kp: 63.238
pid_ki: 0.855
pid_kd: 1169.116
min_temp: -200
max_temp: 130

#####################################################################
# Z steppers (independent of XY orientation)
#####################################################################

## Z0 — Front Left MOTOR5
[stepper_z]
step_pin: PC13
dir_pin: !PF0
enable_pin: !PF1
endstop_pin: probe:z_virtual_endstop
rotation_distance: 4
microsteps: 16
position_max: 300
position_min: -25
homing_speed: 5
second_homing_speed: 1
homing_retract_dist: 3

[tmc2209 stepper_z]
uart_pin: PE4
interpolate: true
run_current: 0.7
hold_current: 0.50
sense_resistor: 0.110
stealthchop_threshold: 100

## Z1 — Rear Left MOTOR2_1
[stepper_z1]
step_pin: PF11
dir_pin: !PG3
enable_pin: !PG5
rotation_distance: 4
microsteps: 16

[tmc2209 stepper_z1]
uart_pin: PC6
interpolate: true
run_current: 0.7
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 100

## Z2 — Rear Right MOTOR3
[stepper_z2]
step_pin: PG4
dir_pin: !PC1
enable_pin: !PA2
rotation_distance: 4
microsteps: 16

[tmc2209 stepper_z2]
uart_pin: PC7
interpolate: true
run_current: 0.7
hold_current: 0.5
sense_resistor: 0.110
stealthchop_threshold: 100

## Z3 — Front Right MOTOR4
[stepper_z3]
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
rotation_distance: 4
microsteps: 16

[tmc2209 stepper_z3]
uart_pin: PF2
interpolate: true
run_current: 0.7
hold_current: 0.50
sense_resistor: 0.110
stealthchop_threshold: 100

#####################################################################
# Fans / lights
#####################################################################

[multi_pin part_cooling]
pins: MAG_TOOL:gpio17, MAG_TOOL:gpio11

[multi_pin part_cooling_enable]
pins: MAG_TOOL:gpio3, MAG_TOOL:gpio2

[temperature_fan pi]
pin: PD15
max_power: 0.60
control: watermark
max_delta: 5.0
sensor_type: temperature_host
min_temp: 10.0
max_temp: 80.0
target_temp: 55.0
shutdown_speed: 0.0

[fan]
pin: multi_pin:part_cooling
max_power: 1.0
kick_start_time: 0.5
off_below: 0.10
enable_pin: multi_pin:part_cooling_enable

[fan_generic Jetstream]
pin: PE10
enable_pin: PE7
max_power: 1.0
kick_start_time: 0.5
cycle_time: 0.01
off_below: 0.4

[led Chamber_Lights]
white_pin: PD14

#####################################################################
# Homing / kill
#####################################################################

[gcode_button kill_switch]
pin: !PG11
press_gcode:
    PAUSE
    M118 X or Y motion is blocked.
    M107
    M104 S0
    M140 S0

[homing_override]
axes: z
set_position_z: 0
gcode:
    # MagXY must be armed before XY/Z motion
    LM_ENABLE
    G90
    G1 Z5 F600
    {% if "xy" not in printer.toolhead.homed_axes %}
        G28 X
        G28 Y
    {% endif %}
    # Center-ish for both stock (400x300) and OriginMove (300x400)
    G0 X{printer.toolhead.axis_maximum.x / 2} Y{printer.toolhead.axis_maximum.y / 2} F6000
    CLEAR_LOAD_CELL
    G4 P500
    G28 Z
    G1 Z5 F600
