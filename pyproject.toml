[tool.ruff]
target-version = "py39"
line-length = 100
src = ["os/magneto-manager", "scripts", "tests"]

[tool.ruff.lint]
select = [
  "E",   # pycodestyle
  "F",   # pyflakes
  "I",   # isort
  "B",   # bugbear
  "UP",  # pyupgrade
]
ignore = [
  "E501",  # line length — configs/comments often long
]

[tool.ruff.lint.per-file-ignores]
"tests/*" = ["B011"]
